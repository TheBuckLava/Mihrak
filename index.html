<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --surface2: #161625;
  --surface3: #1e1e30;
  --border: #2a2a40;
  --border2: #3a3a55;
  --accent: #c4a35a;
  --accent2: #e8c97a;
  --accent-glow: rgba(196,163,90,0.15);
  --text: #e8e4f0;
  --text-muted: #7a7590;
  --text-dim: #4a4560;
  --color-turkce: #e05c7a;
  --color-matematik: #5c9ee0;
  --color-fizik: #e08c5c;
  --color-kimya: #5ce0a8;
  --color-biyoloji: #a05ce0;
  --color-geometri: #5ce0d4;
  --color-tarih: #e0c55c;
  --color-cografya: #7ae05c;
  --color-felsefe: #e05ce0;
  --color-dil: #5c7ae0;
  --ff-head: 'Playfair Display', serif;
  --ff-body: 'Outfit', sans-serif;
  --ff-mono: 'JetBrains Mono', monospace;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--ff-body);
  font-size: 14px;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9999;opacity:0.4;
}

/* ── LOGIN ── */
#login-screen {
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;gap:2rem;padding:2rem;
  background:radial-gradient(ellipse at 50% 40%, rgba(196,163,90,0.08) 0%, transparent 70%);
}
.login-logo { font-family:var(--ff-head);font-size:clamp(3rem,10vw,5rem);font-weight:600;letter-spacing:0.3em;color:var(--accent);text-shadow:0 0 60px rgba(196,163,90,0.4);animation:fadeUp 0.8s ease both; }
.login-subtitle { font-size:0.75rem;letter-spacing:0.2em;color:var(--text-muted);text-transform:uppercase;animation:fadeUp 0.8s 0.2s ease both; }
.login-btn { display:flex;align-items:center;gap:0.8rem;padding:0.9rem 2rem;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:var(--ff-body);font-size:0.9rem;cursor:pointer;transition:all 0.3s;animation:fadeUp 0.8s 0.4s ease both; }
.login-btn:hover { background:var(--surface3);border-color:var(--accent);color:var(--accent);box-shadow:0 0 20px var(--accent-glow); }
.login-btn svg { width:18px;height:18px; }
.guest-btn { background:transparent;border:1px solid var(--border);color:var(--text-muted);font-size:0.8rem;padding:0.6rem 1.5rem;border-radius:6px;cursor:pointer;font-family:var(--ff-body);transition:all 0.3s;animation:fadeUp 0.8s 0.5s ease both; }
.guest-btn:hover { border-color:var(--text-muted);color:var(--text); }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }

/* ── APP ── */
#app { display:none;flex-direction:column;min-height:100vh; }
#app.visible { display:flex; }

/* ── HEADER ── */
.header {
  display:flex;align-items:center;justify-content:space-between;
  padding:0.9rem 1.5rem;border-bottom:1px solid var(--border);
  background:var(--surface);position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);
}
.header-logo { font-family:var(--ff-head);font-size:1.5rem;font-weight:600;letter-spacing:0.2em;color:var(--accent);text-shadow:0 0 20px rgba(196,163,90,0.3);display:flex;flex-direction:column;line-height:1.3; }
.header-byline { font-family:var(--ff-mono);font-size:0.45rem;letter-spacing:0.1em;color:var(--text-dim);font-weight:300;text-shadow:none; }
.header-actions { display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap; }

.nav-btn { padding:0.4rem 0.85rem;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text-muted);font-family:var(--ff-body);font-size:0.75rem;font-weight:500;cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.05em; }
.nav-btn:hover,.nav-btn.active { border-color:var(--accent);color:var(--accent);background:var(--accent-glow); }
.signout-btn { padding:0.4rem 0.7rem;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text-dim);font-size:0.75rem;cursor:pointer;font-family:var(--ff-body);transition:all 0.2s; }
.signout-btn:hover { border-color:#e05c7a;color:#e05c7a; }

@media (max-width:500px) {
  .header { flex-wrap:wrap;gap:0.5rem;padding:0.7rem 1rem; }
  .header-logo { font-size:1.2rem; }
  .header-actions { width:100%;justify-content:center; }
  .nav-btn { flex:1;text-align:center;font-size:0.7rem;padding:0.4rem 0.5rem; }
  .signout-btn { width:100%;text-align:center; }
}

/* ── VIEWS ── */
.view { display:none;padding:1.2rem; }
.view.active { display:block; }

/* ── PLANNER LAYOUT ── */
.planner-layout { display:grid;grid-template-columns:280px 1fr;gap:1.5rem;align-items:start; }
@media (max-width:768px) { .planner-layout { grid-template-columns:1fr; } }

/* ── POOL ── */
.pool-panel { background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;position:sticky;top:72px; }
.pool-header { padding:1rem 1.2rem 0.8rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between; }
.pool-title { font-family:var(--ff-head);font-size:1.05rem;font-weight:600;color:var(--text); }
.pool-count { font-size:0.7rem;color:var(--text-muted);background:var(--surface3);padding:0.2rem 0.5rem;border-radius:20px;border:1px solid var(--border); }
.add-task-btn { width:100%;padding:0.75rem;background:transparent;border:1px dashed var(--border2);border-radius:6px;color:var(--accent);font-family:var(--ff-body);font-size:0.8rem;font-weight:500;cursor:pointer;transition:all 0.2s;margin:0.8rem 0 0; }
.add-task-btn:hover { background:var(--accent-glow);border-color:var(--accent); }
.pool-tasks { padding:0.8rem;min-height:80px;max-height:calc(100vh - 220px);overflow-y:auto;display:flex;flex-direction:column;gap:0.4rem; }
.pool-tasks::-webkit-scrollbar { width:3px; }
.pool-tasks::-webkit-scrollbar-thumb { background:var(--border2);border-radius:2px; }

/* ── WEEKS ── */
.weeks-container { display:flex;flex-direction:column;gap:1.5rem; }
.week-block { background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden; }
.week-header { padding:0.75rem 1.2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface2); }
.week-label { font-family:var(--ff-head);font-size:0.95rem;font-weight:600;letter-spacing:0.1em;color:var(--text-muted);text-transform:uppercase; }
.week-summary { display:flex;gap:1rem;align-items:center; }
.week-stat { font-size:0.7rem;color:var(--text-dim); }
.week-stat span { color:var(--accent);font-weight:600; }

@media (max-width:768px) {
  .week-block { background:transparent;border:none;border-radius:0;overflow:visible; }
  .week-header { border-radius:10px;border:1px solid var(--border); }
}

/* ── DAYS GRID ── */
.days-grid { display:grid;grid-template-columns:repeat(7,1fr);overflow-x:auto; }
@media (max-width:900px) { .days-grid { grid-template-columns:repeat(7,minmax(130px,1fr)); } }
@media (max-width:768px) { .days-grid { display:flex;flex-direction:column;overflow-x:unset;gap:0.5rem;padding:0.5rem;background:var(--bg); } }

/* ── DAY COL ── */
.day-col { border-right:1px solid var(--border);display:flex;flex-direction:column; }
.day-col:last-child { border-right:none; }
@media (max-width:768px) { .day-col { border-right:none;border-radius:8px;border:1px solid var(--border);background:var(--surface);overflow:hidden; } }

.day-header { padding:0.6rem 0.7rem 0.5rem;border-bottom:1px solid var(--border);background:var(--surface2);position:sticky;top:0; }
@media (max-width:768px) {
  .day-header { display:flex;align-items:center;gap:0.7rem;padding:0.6rem 0.9rem;position:static; }
  .day-name { font-size:0.65rem;letter-spacing:0.12em;color:var(--accent);min-width:28px;margin-bottom:0; }
  .day-date { font-size:1rem; }
  .day-progress { display:none; }
  .day-progress-bar { flex:1;margin-top:0;height:3px; }
  .day-note-btn { margin-left:auto; }
  .day-tasks { min-height:40px;padding:0.5rem 0.8rem; }
}

.day-name { font-size:0.6rem;letter-spacing:0.1em;color:var(--text-muted);text-transform:uppercase;margin-bottom:0.12rem;font-family:var(--ff-mono); }
.day-date { font-family:var(--ff-head);font-size:1.3rem;font-weight:600;color:var(--text);line-height:1; }
.day-date.today { color:var(--accent); }
.day-progress { font-size:0.55rem;color:var(--text-dim);margin-top:0.2rem; }
.day-progress-bar { height:2px;background:var(--border);border-radius:1px;margin-top:0.25rem;overflow:hidden; }
.day-progress-fill { height:100%;background:var(--accent);border-radius:1px;transition:width 0.4s ease; }
.day-note-btn { font-size:0.55rem;color:var(--text-dim);cursor:pointer;padding:0.15rem 0.3rem;border-radius:2px;transition:all 0.2s;border:none;background:none;font-family:var(--ff-mono); }
.day-note-btn:hover { color:var(--accent); }
.day-note-btn.has-note { color:var(--accent2); }
.day-tasks { flex:1;padding:0.4rem;display:flex;flex-direction:column;gap:0.3rem;min-height:60px; }
.day-tasks.drag-over { background:rgba(196,163,90,0.06); }

/* ── TASK CARD ── */
.task-card {
  border-radius:6px;padding:0.45rem 0.6rem;cursor:grab;position:relative;
  background:var(--surface3);border:1px solid var(--border);overflow:hidden;
  user-select:none;-webkit-user-select:none;transition:transform 0.15s,box-shadow 0.15s,border-color 0.15s;
}
.task-card::before { content:'';position:absolute;left:0;top:0;bottom:0;width:3px; }
.task-card:hover { border-color:var(--border2);transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,0.35); }
.task-card:active { cursor:grabbing; }
.task-card.completed { opacity:0.4; }
.task-card.completed .task-name { text-decoration:line-through; }

.task-name { font-size:0.78rem;font-weight:500;color:var(--text);margin-bottom:0.2rem;line-height:1.35; }
.task-meta { display:flex;flex-wrap:wrap;gap:0.2rem;align-items:center; }
.task-badge { font-size:0.58rem;padding:0.1rem 0.4rem;border-radius:3px;font-weight:600;text-transform:uppercase;font-family:var(--ff-mono); }
.badge-tyt { background:rgba(94,148,224,0.15);color:#5e94e0; }
.badge-ayt { background:rgba(224,92,122,0.15);color:#e05c7a; }
.task-duration { font-size:0.58rem;color:var(--text-dim);margin-left:auto;font-family:var(--ff-mono); }
.task-actions { display:flex;gap:0.3rem;margin-top:0.3rem;align-items:center; }
.complete-btn { font-size:0.6rem;padding:0.2rem 0.5rem;border-radius:3px;border:1px solid var(--border2);background:transparent;color:var(--text-muted);cursor:pointer;font-family:var(--ff-body);font-weight:500;transition:all 0.2s; }
.complete-btn:hover { border-color:#5ce0a8;color:#5ce0a8; }
.task-card.completed .complete-btn { border-color:#5ce0a8;color:#5ce0a8;background:rgba(92,224,168,0.08); }
.view-btn { font-size:0.6rem;padding:0.2rem 0.4rem;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;font-family:var(--ff-body);transition:all 0.2s; }
.view-btn:hover { border-color:var(--accent);color:var(--accent); }
.delete-btn { font-size:0.6rem;padding:0.2rem 0.4rem;border-radius:3px;border:1px solid transparent;background:transparent;color:var(--text-dim);cursor:pointer;font-family:var(--ff-body);transition:all 0.2s;margin-left:auto; }
.delete-btn:hover { border-color:#e05c7a;color:#e05c7a; }
.repeat-badge { font-size:0.55rem;color:var(--accent2); }

/* ── DERS RENKLERİ (düzeltildi) ── */
.task-card[data-lesson*="ürkçe"]::before { background:var(--color-turkce); }
.task-card[data-lesson*="atematik"]::before { background:var(--color-matematik); }
.task-card[data-lesson*="eometri"]::before { background:var(--color-geometri); }
.task-card[data-lesson*="izik"]::before { background:var(--color-fizik); }
.task-card[data-lesson*="imya"]::before { background:var(--color-kimya); }
.task-card[data-lesson*="iyoloji"]::before { background:var(--color-biyoloji); }
.task-card[data-lesson*="arih"]::before { background:var(--color-tarih); }
.task-card[data-lesson*="ografya"]::before { background:var(--color-cografya); }
.task-card[data-lesson*="elsefe"]::before { background:var(--color-felsefe); }
.task-card[data-lesson*="ngiliz"]::before,.task-card[data-lesson*="il "]::before { background:var(--color-dil); }

.task-note-preview { font-size:0.65rem;color:var(--text-dim);margin:0.15rem 0 0.2rem;line-height:1.35;font-style:italic; }
.task-card.drag-target { border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow); }
.empty-drop { font-size:0.6rem;color:var(--text-dim);text-align:center;padding:0.8rem 0.5rem;pointer-events:none; }

/* ── MODAL ── */
.modal-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:500;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(5px); }
.modal-overlay.open { display:flex; }
.modal { background:var(--surface);border:1px solid var(--border2);border-radius:10px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 70px rgba(0,0,0,0.7);animation:modalIn 0.22s ease both; }
.modal.wide { max-width:720px; }
.modal::-webkit-scrollbar { width:3px; }
.modal::-webkit-scrollbar-thumb { background:var(--border2); }
@keyframes modalIn { from{opacity:0;transform:translateY(14px) scale(0.97)} to{opacity:1;transform:none} }
.modal-header { padding:1.1rem 1.4rem 0.9rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between; }
.modal-title { font-family:var(--ff-head);font-size:1.15rem;font-weight:600;color:var(--text); }
.modal-close { background:none;border:none;color:var(--text-dim);font-size:1.3rem;cursor:pointer;transition:color 0.2s;line-height:1; }
.modal-close:hover { color:var(--text); }
.modal-body { padding:1.1rem 1.4rem;display:flex;flex-direction:column;gap:0.9rem; }
.modal-footer { padding:0.9rem 1.4rem;border-top:1px solid var(--border);display:flex;gap:0.7rem;justify-content:flex-end; }

.form-group { display:flex;flex-direction:column;gap:0.35rem; }
.form-label { font-size:0.65rem;letter-spacing:0.1em;color:var(--text-muted);text-transform:uppercase;font-weight:600; }
.form-input,.form-select,.form-textarea { background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--ff-body);font-size:0.85rem;padding:0.6rem 0.8rem;transition:border-color 0.2s;width:100%; }
.form-input:focus,.form-select:focus,.form-textarea:focus { outline:none;border-color:var(--accent); }
.form-textarea { resize:vertical;min-height:70px; }
.form-select { cursor:pointer; }
.form-select option { background:var(--surface2); }

.toggle-group { display:flex;gap:0.4rem; }
.toggle-btn { flex:1;padding:0.5rem;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text-muted);font-family:var(--ff-body);font-size:0.78rem;font-weight:500;cursor:pointer;transition:all 0.2s;text-align:center; }
.toggle-btn.active { border-color:var(--accent);color:var(--accent);background:var(--accent-glow); }

.btn-primary { padding:0.6rem 1.4rem;background:var(--accent);border:none;border-radius:6px;color:var(--bg);font-family:var(--ff-body);font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.2s; }
.btn-primary:hover { background:var(--accent2);box-shadow:0 0 18px rgba(196,163,90,0.35); }
.btn-secondary { padding:0.6rem 1.2rem;background:transparent;border:1px solid var(--border2);border-radius:6px;color:var(--text-muted);font-family:var(--ff-body);font-size:0.82rem;cursor:pointer;transition:all 0.2s; }
.btn-secondary:hover { border-color:var(--text-muted);color:var(--text); }

/* ── DETAIL ── */
.detail-row { display:flex;gap:0.8rem;align-items:flex-start;padding:0.5rem 0;border-bottom:1px solid var(--border); }
.detail-row:last-child { border-bottom:none; }
.detail-key { font-size:0.62rem;letter-spacing:0.08em;color:var(--text-dim);text-transform:uppercase;min-width:90px;padding-top:0.1rem;font-family:var(--ff-mono); }
.detail-val { font-size:0.82rem;color:var(--text);flex:1;line-height:1.5; }
.detail-completed { color:#5ce0a8; }

/* ── ARCHIVE ── */
.archive-list { display:flex;flex-direction:column;gap:1rem; }
.archive-week { background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden; }
.archive-week-header { padding:0.8rem 1.2rem;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background 0.2s; }
.archive-week-header:hover { background:var(--surface3); }
.archive-week-label { font-family:var(--ff-head);font-size:1rem;font-weight:600;color:var(--text-muted); }
.archive-stats { display:flex;gap:1.2rem; }
.archive-stat { font-size:0.65rem;color:var(--text-dim); }
.archive-stat span { color:var(--accent); }
.archive-week-body { display:none;padding:1rem; }
.archive-week-body.open { display:block; }
.archive-tasks { display:flex;flex-wrap:wrap;gap:0.5rem; }

/* ── GÜN NOTU ── */
.day-note-display { font-size:0.72rem;color:var(--text-muted);padding:0.4rem 0.7rem;margin:0 0.4rem 0.4rem;background:var(--surface2);border-radius:4px;border-left:2px solid var(--accent);line-height:1.5;white-space:pre-wrap; }

/* ── TOAST ── */
.toast { position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(60px);background:var(--surface3);border:1px solid var(--border2);border-radius:6px;padding:0.65rem 1.3rem;font-size:0.75rem;color:var(--text);z-index:9000;transition:transform 0.3s ease;pointer-events:none;white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0); }

/* ── LOADING ── */
#loading { display:flex;align-items:center;justify-content:center;min-height:100vh;font-size:0.8rem;letter-spacing:0.2em;color:var(--text-dim);font-family:var(--ff-mono); }
.dot-pulse::after { content:'...';animation:dots 1.5s infinite; }
@keyframes dots { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} }

/* ════════════════════════════════════
   DENEME ANALİZİ
════════════════════════════════════ */
.exam-view-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;flex-wrap:wrap;gap:0.7rem; }
.exam-view-title { font-family:var(--ff-head);font-size:1.4rem;font-weight:600;color:var(--text); }
.exam-view-actions { display:flex;gap:0.5rem; }

.exam-list { display:flex;flex-direction:column;gap:0.8rem; }
.exam-card { background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color 0.2s; }
.exam-card:hover { border-color:var(--border2); }
.exam-card-header { padding:0.9rem 1.2rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:var(--surface2); }
.exam-card-header:hover { background:var(--surface3); }
.exam-card-title { font-family:var(--ff-head);font-size:1rem;font-weight:600;color:var(--text); }
.exam-card-meta { display:flex;align-items:center;gap:1rem; }
.exam-card-net { font-size:0.8rem;font-family:var(--ff-mono); }
.exam-card-net span { color:var(--accent);font-weight:600; }
.exam-card-date { font-size:0.65rem;color:var(--text-dim);font-family:var(--ff-mono); }
.exam-card-actions { display:flex;gap:0.4rem; }
.exam-card-body { display:none;padding:1rem 1.2rem; }
.exam-card-body.open { display:block; }

/* Net tablosu */
.net-table { width:100%;border-collapse:collapse;margin-bottom:1rem; }
.net-table th { font-size:0.62rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;padding:0.4rem 0.6rem;border-bottom:1px solid var(--border);text-align:left;font-family:var(--ff-mono); }
.net-table td { font-size:0.78rem;padding:0.35rem 0.6rem;border-bottom:1px solid var(--border);color:var(--text); }
.net-table tr:last-child td { border-bottom:none; }
.net-table .net-val { color:var(--accent);font-weight:600;font-family:var(--ff-mono); }
.net-table .total-row td { color:var(--accent2);font-weight:600;border-top:1px solid var(--border2); }

/* Konu yanlış */
.wrong-topics-section { margin-top:0.8rem; }
.wrong-topics-title { font-size:0.65rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:0.6rem;font-family:var(--ff-mono); }
.wrong-subject { margin-bottom:0.8rem; }
.wrong-subject-name { font-size:0.78rem;font-weight:600;color:var(--text);margin-bottom:0.3rem;padding:0.3rem 0;border-bottom:1px solid var(--border); }
.wrong-topics-grid { display:flex;flex-direction:column;gap:0.2rem; }
.wrong-topic-row { display:flex;align-items:center;gap:0.5rem;font-size:0.72rem;color:var(--text-muted);padding:0.15rem 0; }
.wrong-topic-name { flex:1; }
.wrong-topic-count { font-family:var(--ff-mono);color:var(--accent);font-weight:600;min-width:20px;text-align:right; }
.wrong-topic-count.zero { color:var(--text-dim); }

/* Deneme modal */
.exam-modal-tabs { display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1rem; }
.exam-tab { padding:0.6rem 1rem;font-size:0.75rem;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text-muted);font-family:var(--ff-body);border-bottom:2px solid transparent;transition:all 0.2s; }
.exam-tab.active { color:var(--accent);border-bottom-color:var(--accent); }

.net-input-grid { display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.6rem; }
@media (max-width:480px) { .net-input-grid { grid-template-columns:1fr 1fr; } }
.net-input-group { display:flex;flex-direction:column;gap:0.3rem; }
.net-input-label { font-size:0.6rem;color:var(--text-muted);letter-spacing:0.06em;font-family:var(--ff-mono); }
.net-input-row { display:flex;gap:0.3rem;align-items:center; }
.net-mini-input { flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--ff-mono);font-size:0.78rem;padding:0.35rem 0.5rem;width:100%;text-align:center; }
.net-mini-input:focus { outline:none;border-color:var(--accent); }
.net-mini-sep { color:var(--text-dim);font-size:0.7rem; }
.net-result { font-size:0.7rem;font-family:var(--ff-mono);color:var(--accent);text-align:center;margin-top:0.2rem;font-weight:600; }

/* Konu counter */
.topic-counter-grid { display:flex;flex-direction:column;gap:0.4rem; }
.topic-subject-section { margin-bottom:0.6rem; }
.topic-subject-label { font-size:0.7rem;font-weight:600;color:var(--text);padding:0.4rem 0;border-bottom:1px solid var(--border);margin-bottom:0.3rem;font-family:var(--ff-head); }
.topic-counter-row { display:flex;align-items:center;gap:0.5rem;padding:0.2rem 0; }
.topic-counter-name { flex:1;font-size:0.72rem;color:var(--text-muted); }
.counter-btn { width:22px;height:22px;border-radius:3px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0; }
.counter-btn:hover { border-color:var(--accent);color:var(--accent); }
.counter-val { font-family:var(--ff-mono);font-size:0.75rem;min-width:20px;text-align:center;color:var(--text); }
.counter-val.nonzero { color:var(--accent);font-weight:600; }

/* Analiz modal */
.analysis-filter { display:flex;gap:0.4rem;margin-bottom:1rem;flex-wrap:wrap; }
.filter-btn { padding:0.35rem 0.8rem;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--text-muted);font-family:var(--ff-body);font-size:0.72rem;cursor:pointer;transition:all 0.2s; }
.filter-btn.active { border-color:var(--accent);color:var(--accent);background:var(--accent-glow); }
.analysis-subject { margin-bottom:1.2rem; }
.analysis-subject-name { font-family:var(--ff-head);font-size:1rem;font-weight:600;color:var(--text);margin-bottom:0.5rem;padding-bottom:0.3rem;border-bottom:1px solid var(--border); }
.analysis-topic-row { display:flex;align-items:center;gap:0.6rem;padding:0.25rem 0; }
.analysis-topic-name { flex:1;font-size:0.75rem;color:var(--text-muted); }
.analysis-bar-wrap { width:100px;height:5px;background:var(--border);border-radius:3px;overflow:hidden; }
.analysis-bar-fill { height:100%;border-radius:3px;background:var(--color-turkce);transition:width 0.4s; }
.analysis-topic-count { font-family:var(--ff-mono);font-size:0.7rem;color:var(--accent);font-weight:600;min-width:24px;text-align:right; }

/* ════════════════════════════════════
   NOTLAR
════════════════════════════════════ */
.notes-view-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;flex-wrap:wrap;gap:0.7rem; }
.notes-view-title { font-family:var(--ff-head);font-size:1.4rem;font-weight:600;color:var(--text); }

.notes-tabs { display:flex;gap:0.4rem;margin-bottom:1.2rem;flex-wrap:wrap; }
.note-tab-btn { padding:0.35rem 0.9rem;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--text-muted);font-family:var(--ff-body);font-size:0.75rem;cursor:pointer;transition:all 0.2s; }
.note-tab-btn.active { border-color:var(--accent);color:var(--accent);background:var(--accent-glow); }

.notes-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:0.8rem; }
@media (max-width:480px) { .notes-grid { grid-template-columns:1fr; } }

.note-card { background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;transition:border-color 0.2s; }
.note-card:hover { border-color:var(--border2); }
.note-card-header { padding:0.6rem 0.8rem;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between; }
.note-card-date { font-size:0.58rem;color:var(--text-dim);font-family:var(--ff-mono); }
.note-card-actions { display:flex;gap:0.3rem; }
.note-card-body { padding:0.8rem;flex:1;font-size:0.8rem;line-height:1.6;color:var(--text-muted);white-space:pre-wrap;word-break:break-word; }

/* Rich text toolbar */
.rich-toolbar { display:flex;gap:0.3rem;flex-wrap:wrap;padding:0.5rem;background:var(--surface2);border:1px solid var(--border);border-radius:6px 6px 0 0;border-bottom:none; }
.rich-btn { padding:0.2rem 0.5rem;border:1px solid var(--border);border-radius:3px;background:transparent;color:var(--text-muted);font-size:0.7rem;cursor:pointer;transition:all 0.15s;font-family:var(--ff-body); }
.rich-btn:hover { border-color:var(--accent);color:var(--accent); }
.rich-btn.b { font-weight:700; }
.rich-btn.i { font-style:italic; }
.rich-color { width:18px;height:18px;border-radius:50%;border:2px solid var(--border);cursor:pointer;flex-shrink:0; }
.rich-color:hover { border-color:var(--text); }
.note-editor { background:var(--surface2);border:1px solid var(--border);border-radius:0 0 6px 6px;color:var(--text);font-family:var(--ff-body);font-size:0.85rem;padding:0.7rem;min-height:180px;outline:none;white-space:pre-wrap;word-break:break-word;overflow-y:auto; }
.note-editor:focus { border-color:var(--accent); }
.note-editor [style] { display:inline; }
</style>
</head>
<body>

<div id="loading"><span class="dot-pulse">yükleniyor</span></div>

<div id="login-screen" style="display:none">
  <div class="login-logo">MİHRAK</div>
  <div class="login-subtitle">haftalık çalışma planlayıcı</div>
  <button class="login-btn" id="google-login-btn">
    <svg viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Google ile Giriş Yap
  </button>
  <button class="guest-btn" id="guest-btn">misafir olarak görüntüle</button>
</div>

<div id="app">
  <header class="header">
    <div class="header-logo">
      <div style="display:flex;align-items:center;gap:0.5rem">
        <svg width="22" height="28" viewBox="0 0 32 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="flameGrad" cx="50%" cy="80%" r="60%">
              <stop offset="0%" stop-color="#e8c97a"/>
              <stop offset="100%" stop-color="#c4a35a"/>
            </radialGradient>
          </defs>
          <path d="M16 2 C16 2 26 12 26 22 C26 28.6 21.5 34 16 36 C10.5 34 6 28.6 6 22 C6 12 16 2 16 2Z" fill="url(#flameGrad)" opacity="0.95"/>
          <circle cx="16" cy="23" r="5" fill="#0f0f1a" opacity="0.55"/>
        </svg>
        MİHRAK
      </div>
      <span class="header-byline">Made by TheBuckLava · Powered by AI</span>
    </div>
    <div class="header-actions">
      <button class="nav-btn active" id="nav-planner">Program</button>
      <button class="nav-btn" id="nav-archive">Arşiv</button>
      <button class="nav-btn" id="nav-exam">Denemeler</button>
      <button class="nav-btn" id="nav-notes">Notlar</button>
      <button class="signout-btn" id="signout-btn">çıkış</button>
    </div>
  </header>

  <!-- Planner -->
  <div class="view active" id="view-planner">
    <div class="planner-layout">
      <div class="pool-panel">
        <div class="pool-header">
          <div class="pool-title">Görev Havuzu</div>
          <div class="pool-count" id="pool-count">0</div>
        </div>
        <div class="pool-tasks" id="pool-tasks"
          ondragover="event.preventDefault();this.classList.add('drag-over')"
          ondragleave="this.classList.remove('drag-over')"
          ondrop="handleDrop(event,null)">
          <div class="empty-drop" id="pool-empty">henüz görev yok</div>
        </div>
        <div style="padding:0 0.8rem 0.8rem">
          <button class="add-task-btn" id="add-task-btn">+ yeni görev ekle</button>
        </div>
      </div>
      <div class="weeks-container" id="weeks-container"></div>
    </div>
  </div>

  <!-- Archive -->
  <div class="view" id="view-archive">
    <div class="archive-list" id="archive-list"></div>
  </div>

  <!-- Exam Analysis -->
  <div class="view" id="view-exam">
    <div class="exam-view-header">
      <div class="exam-view-title">Deneme Analizleri</div>
      <div class="exam-view-actions">
        <button class="btn-secondary" id="open-analysis-btn">📊 Analiz</button>
        <button class="btn-primary" id="new-exam-btn">+ Yeni Deneme</button>
      </div>
    </div>
    <div class="exam-list" id="exam-list"></div>
  </div>

  <!-- Notes -->
  <div class="view" id="view-notes">
    <div class="notes-view-header">
      <div class="notes-view-title">Notlarım</div>
      <button class="btn-primary" id="new-note-btn">+ Yeni Not</button>
    </div>
    <div class="notes-tabs" id="notes-tabs"></div>
    <div class="notes-grid" id="notes-grid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Task Modal -->
<div class="modal-overlay" id="task-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Yeni Görev</div>
      <button class="modal-close" onclick="closeModal('task-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Ders *</label><input class="form-input" id="f-lesson" placeholder="TYT Türkçe, AYT Matematik..."></div>
      <div class="form-group"><label class="form-label">Konu</label><input class="form-input" id="f-topic" placeholder="Paragraf, Logaritma..."></div>
      <div class="form-group"><label class="form-label">TYT / AYT</label>
        <div class="toggle-group">
          <button class="toggle-btn" data-val="TYT" onclick="selectToggle(this,'exam-type')">TYT</button>
          <button class="toggle-btn" data-val="AYT" onclick="selectToggle(this,'exam-type')">AYT</button>
          <button class="toggle-btn active" data-val="" onclick="selectToggle(this,'exam-type')">Boş</button>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Görev Türü</label><input class="form-input" id="f-type" placeholder="Test, Konu Anlatımı, Video, Deneme..."></div>
      <div class="form-group"><label class="form-label">Kaynak</label><input class="form-input" id="f-source" placeholder="Hoca / Kitap / Kanal adı..."></div>
      <div class="form-group"><label class="form-label">Soru Sayısı</label><input class="form-input" id="f-questions" type="number" placeholder="40"></div>
      <div class="form-group"><label class="form-label">Tahmini Süre (dakika)</label><input class="form-input" id="f-duration" type="number" placeholder="45"></div>
      <div class="form-group"><label class="form-label">Not</label><textarea class="form-textarea" id="f-note" placeholder="Ek notlar..."></textarea></div>
      <div class="form-group"><label class="form-label">Tekrarlayan Görev</label>
        <div class="toggle-group">
          <button class="toggle-btn active" data-val="false" onclick="selectToggle(this,'recurring')">Hayır</button>
          <button class="toggle-btn" data-val="true" onclick="selectToggle(this,'recurring')">Evet, her hafta</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('task-modal')">İptal</button>
      <button class="btn-primary" id="save-task-btn">Kaydet</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="detail-title">Görev Detayı</div>
      <button class="modal-close" onclick="closeModal('detail-modal')">×</button>
    </div>
    <div class="modal-body" id="detail-body"></div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('detail-modal')">Kapat</button>
      <button class="btn-primary" id="detail-edit-btn">Düzenle</button>
    </div>
  </div>
</div>

<!-- Day Note Modal -->
<div class="modal-overlay" id="day-note-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="day-note-title">Gün Notu</div>
      <button class="modal-close" onclick="closeModal('day-note-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><textarea class="form-textarea" id="day-note-input" placeholder="Bu gün için notlar..." style="min-height:130px"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('day-note-modal')">İptal</button>
      <button class="btn-primary" id="save-day-note-btn">Kaydet</button>
    </div>
  </div>
</div>

<!-- Exam Modal -->
<div class="modal-overlay" id="exam-modal">
  <div class="modal wide">
    <div class="modal-header">
      <div class="modal-title" id="exam-modal-title">Yeni Deneme</div>
      <button class="modal-close" onclick="closeModal('exam-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Deneme Adı *</label><input class="form-input" id="ef-name" placeholder="TYT Deneme 1..."></div>
      <div class="form-group"><label class="form-label">Sınav Türü</label>
        <div class="toggle-group">
          <button class="toggle-btn active" data-val="TYT" onclick="selectExamType(this)">TYT</button>
          <button class="toggle-btn" data-val="AYT" onclick="selectExamType(this)">AYT Sayısal</button>
        </div>
      </div>
      <div class="exam-modal-tabs">
        <button class="exam-tab active" onclick="switchExamTab(this,'tab-nets')">Netler</button>
        <button class="exam-tab" onclick="switchExamTab(this,'tab-wrongs')">Yanlış Konular</button>
      </div>
      <div id="tab-nets"></div>
      <div id="tab-wrongs" style="display:none"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('exam-modal')">İptal</button>
      <button class="btn-primary" id="save-exam-btn">Kaydet</button>
    </div>
  </div>
</div>

<!-- Analysis Modal -->
<div class="modal-overlay" id="analysis-modal">
  <div class="modal wide">
    <div class="modal-header">
      <div class="modal-title">Konu Analizi</div>
      <button class="modal-close" onclick="closeModal('analysis-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="analysis-filter" id="analysis-filter">
        <button class="filter-btn active" data-n="0" onclick="selectAnalysisFilter(this)">Tümü</button>
        <button class="filter-btn" data-n="3" onclick="selectAnalysisFilter(this)">Son 3</button>
        <button class="filter-btn" data-n="5" onclick="selectAnalysisFilter(this)">Son 5</button>
        <button class="filter-btn" data-n="10" onclick="selectAnalysisFilter(this)">Son 10</button>
      </div>
      <div id="analysis-body"></div>
    </div>
  </div>
</div>

<!-- Note Modal -->
<div class="modal-overlay" id="note-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="note-modal-title">Yeni Not</div>
      <button class="modal-close" onclick="closeModal('note-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Ders / Kategori</label>
        <select class="form-select" id="note-category"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Not</label>
        <div class="rich-toolbar" id="rich-toolbar">
          <button class="rich-btn b" onclick="execRich('bold')">K</button>
          <button class="rich-btn i" onclick="execRich('italic')">İ</button>
          <button class="rich-btn" onclick="execRich('underline')" style="text-decoration:underline">A</button>
          <button class="rich-btn" onclick="execRich('clear')" title="Formatı Temizle" style="color:var(--color-turkce)">✕</button>
          <span style="color:var(--border2);margin:0 0.1rem">|</span>
          <button class="rich-btn" onclick="execFontSize('sm')" style="font-size:0.6rem">A</button>
          <button class="rich-btn" onclick="execFontSize('md')" style="font-size:0.75rem">A</button>
          <button class="rich-btn" onclick="execFontSize('lg')" style="font-size:0.9rem">A</button>
          <button class="rich-btn" onclick="execFontSize('xl')" style="font-size:1.05rem">A</button>
          <span style="color:var(--border2);margin:0 0.1rem">|</span>
          <div class="rich-color" style="background:#e8e4f0" title="Beyaz" onclick="execColor('#e8e4f0')"></div>
          <div class="rich-color" style="background:#e8c97a" title="Altın" onclick="execColor('#e8c97a')"></div>
          <div class="rich-color" style="background:#5c9ee0" title="Mavi" onclick="execColor('#5c9ee0')"></div>
          <div class="rich-color" style="background:#5ce0a8" title="Yeşil" onclick="execColor('#5ce0a8')"></div>
          <div class="rich-color" style="background:#e05c7a" title="Kırmızı" onclick="execColor('#e05c7a')"></div>
          <div class="rich-color" style="background:#a05ce0" title="Mor" onclick="execColor('#a05ce0')"></div>
        </div>
        <div class="note-editor" id="note-editor" contenteditable="true" spellcheck="false"></div>

// ══════════════════════════════════════════
// SOUND ENGINE
// ══════════════════════════════════════════
const _ctx = new (window.AudioContext || window.webkitAudioContext)();

function _snd(type) {
  try {
    const ctx = _ctx;
    if (ctx.state === 'suspended') ctx.resume();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    const t = ctx.currentTime;
    if (type === 'click') {
      o.type='sine'; o.frequency.setValueAtTime(440,t);
      g.gain.setValueAtTime(0.08,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.06);
      o.start(t); o.stop(t+0.06);
    } else if (type === 'save') {
      o.type='triangle'; o.frequency.setValueAtTime(523,t); o.frequency.setValueAtTime(659,t+0.08);
      g.gain.setValueAtTime(0.1,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
      o.start(t); o.stop(t+0.25);
    } else if (type === 'complete') {
      // tatmin edici complete sesi - üç nota
      [0,0.12,0.24].forEach((delay,i) => {
        const o2=ctx.createOscillator(), g2=ctx.createGain();
        o2.connect(g2); g2.connect(ctx.destination);
        o2.type='sine';
        o2.frequency.setValueAtTime([523,659,784][i], t+delay);
        g2.gain.setValueAtTime(0.15, t+delay);
        g2.gain.exponentialRampToValueAtTime(0.001, t+delay+0.2);
        o2.start(t+delay); o2.stop(t+delay+0.2);
      });
      return;
    } else if (type === 'delete') {
      o.type='sawtooth'; o.frequency.setValueAtTime(220,t);
      g.gain.setValueAtTime(0.06,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
      o.start(t); o.stop(t+0.1);
    }
  } catch(e) {}
}

// DATE HELPERS
// ══════════════════════════════════════════
function getWeekStart(offset=0) {
  const today=new Date(), day=today.getDay();
  const mon=new Date(today);
  mon.setDate(today.getDate()-day+1+offset*7);
  mon.setHours(0,0,0,0); return mon;
}
function getDaysOfWeek(ws) {
  return Array.from({length:7},(_,i)=>{const d=new Date(ws);d.setDate(ws.getDate()+i);return d;});
}
function dateKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function isToday(d) { const t=new Date(); return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate(); }
function formatWeekRange(days) {
  const M=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
  return `${days[0].getDate()} ${M[days[0].getMonth()]} – ${days[6].getDate()} ${M[days[6].getMonth()]}`;
}

}

// ══════════════════════════════════════════
function renderWeeks() {
  const container=document.getElementById('weeks-container');
  container.innerHTML='';
  for (let w=0;w<2;w++) {
    const ws=getWeekStart(w), days=getDaysOfWeek(ws);
    container.appendChild(createWeekBlock(days, w===0?'1. Hafta':'2. Hafta'));
  }
}

function createWeekBlock(days,label) {
  const block=document.createElement('div');
  block.className='week-block';
  const wt=_tasks.filter(t=>t.dayKey&&days.some(d=>dateKey(d)===t.dayKey));
  const done=wt.filter(t=>t.completed).length;
  const min=wt.reduce((s,t)=>s+(parseInt(t.duration)||0),0);
  const h=Math.floor(min/60),m=min%60;
  block.innerHTML=`
    <div class="week-header">
      <div class="week-label">${label} · ${formatWeekRange(days)}</div>
      <div class="week-summary">
        <div class="week-stat"><span>${done}/${wt.length}</span> tamamlandı</div>
        <div class="week-stat"><span>${h>0?h+'s ':''} ${m}dk</span> toplam</div>
      </div>
    </div>
    <div class="days-grid" id="dg-${label.replace(/\s/g,'')}"></div>`;
  const grid=block.querySelector('.days-grid');
  days.forEach(day=>grid.appendChild(createDayCol(day)));
  return block;
}

function createDayCol(date) {
  const key=dateKey(date);
  const dayTasks=[..._tasks.filter(t=>t.dayKey===key)].sort((a,b)=>(a.order??a.createdAt??0)-(b.order??b.createdAt??0));
  const done=dayTasks.filter(t=>t.completed).length;
  const pct=dayTasks.length?Math.round(done/dayTasks.length*100):0;
  const note=_dayNotes[key];
  const col=document.createElement('div');
  col.className='day-col';
  const di=date.getDay();
  col.innerHTML=`
    <div class="day-header">
      <div class="day-name">${DAYS_SHORT[di]}</div>
      <div class="day-date ${isToday(date)?'today':''}">${date.getDate()}</div>
      <div class="day-progress">${pct}%</div>
      <div class="day-progress-bar"><div class="day-progress-fill" style="width:${pct}%"></div></div>
      <button class="day-note-btn ${note?'has-note':''}" onclick="openDayNote('${key}','${DAYS_TR[di]} ${date.getDate()}')">${note?'✦ not':'+ not'}</button>
    </div>
    ${note?`<div class="day-note-display">${escHtml(note)}</div>`:''}
    <div class="day-tasks" id="day-${key}"
      ondragover="event.preventDefault();this.classList.add('drag-over')"
      ondragleave="this.classList.remove('drag-over')"
      ondrop="handleDrop(event,'${key}')">
      ${dayTasks.length===0?'<div class="empty-drop">bırak</div>':''}
    </div>`;
  const td=col.querySelector(`#day-${key}`);
  dayTasks.forEach(t=>td.appendChild(createTaskCard(t)));
  return col;
}

// ══════════════════════════════════════════
// TASK CARD
// ══════════════════════════════════════════
function createTaskCard(task) {
  const card=document.createElement('div');
  card.className=`task-card ${task.completed?'completed':''}`;
  card.dataset.id=task.id;
  card.dataset.order=task.order||task.createdAt||0;
  card.dataset.lesson=(task.lesson||'').toLowerCase();
  card.draggable=!_isGuest;
  if (!_isGuest) {
    card.addEventListener('dragstart',e=>{
      _dragTaskId=task.id;
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',task.id);
      setTimeout(()=>card.style.opacity='0.4',0);
    });
    card.addEventListener('dragend',()=>{card.style.opacity='';});
    card.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';card.classList.add('drag-target');});
    card.addEventListener('dragleave',()=>card.classList.remove('drag-target'));
    card.addEventListener('drop',e=>{
      e.preventDefault();e.stopPropagation();
      card.classList.remove('drag-target');
      handleReorder(_dragTaskId, task.id);
    });
    _setupTouch(card,task.id);
  }
  const exam=task.examType?`<span class="task-badge badge-${task.examType.toLowerCase()}">${task.examType}</span>`:'';
  const rep=task.recurring==='true'?`<span class="repeat-badge">↻</span>`:'';
  const dur=task.duration?`<span class="task-duration">${task.duration}dk</span>`:'';
  const notePreview=task.note?`<div class="task-note-preview">${escHtml(task.note.substring(0,60))}${task.note.length>60?'…':''}</div>`:'';
  card.innerHTML=`
    <div class="task-name">${escHtml(task.lesson||'')}${task.topic?' · '+escHtml(task.topic):''}</div>
    ${notePreview}
    <div class="task-meta">${exam}${rep}${dur}</div>
    ${!_isGuest?`<div class="task-actions">
      <button class="complete-btn" onclick="_snd('complete');toggleComplete('${task.id}')">${task.completed?'✓ tamamlandı':'tamamlandı'}</button>
      <button class="view-btn" onclick="_snd('click');openDetail('${task.id}')">detay</button>
      <button class="delete-btn" onclick="_snd('delete');deleteTask('${task.id}')">sil</button>
    </div>`:`<div class="task-actions"><button class="view-btn" onclick="openDetail('${task.id}')">detay</button></div>`}`;
  return card;
}

// ══════════════════════════════════════════
// TOUCH DRAG
// ══════════════════════════════════════════
let _tc=null,_tEl=null,_tId=null,_tTmr=null,_tZone=null,_tOn=false,_tX=0,_tY=0,_tRaf=null;

function _setupTouch(card,taskId) {
  card.addEventListener('touchstart',e=>{
    if(_isGuest)return;
    _tId=taskId;_tEl=card;
    const t=e.touches[0];_tX=t.clientX;_tY=t.clientY;
    _tTmr=setTimeout(()=>{_tOn=true;_beginDrag(card,t);},300);
  },{passive:true});
  card.addEventListener('touchmove',e=>{
    if(!_tOn||!_tc){clearTimeout(_tTmr);_tTmr=null;return;}
    e.preventDefault();
    const t=e.touches[0];_tX=t.clientX;_tY=t.clientY;
    if(!_tRaf)_tRaf=requestAnimationFrame(_moveDrag);
    _tc.style.visibility='hidden';
    const el=document.elementFromPoint(_tX,_tY);
    _tc.style.visibility='visible';
    if(_tZone)_tZone.classList.remove('drag-over');
    _tZone=el?.closest('.day-tasks,#pool-tasks')||null;
    if(_tZone)_tZone.classList.add('drag-over');
  },{passive:false});
  card.addEventListener('touchend', async e => {
    clearTimeout(_tTmr); _tTmr = null;
    if (_tRaf) { cancelAnimationFrame(_tRaf); _tRaf = null; }
    if (!_tOn || !_tc) { _tOn = false; return; }
    _tc.remove(); _tc = null;
    if (_tZone) _tZone.classList.remove('drag-over');
    const t = e.changedTouches[0];
    const el = document.elementFromPoint(t.clientX, t.clientY);
    const targetCard = el?.closest('.task-card');
    const zone = el?.closest('.day-tasks,#pool-tasks');
    if (targetCard && targetCard.dataset.id && targetCard.dataset.id !== _tId) {
      await _dropTouch(targetCard.closest('.day-tasks')?.id?.replace('day-','') || null, targetCard.dataset.id);
    } else if (zone) {
      const dk = zone.id.startsWith('day-') ? zone.id.replace('day-','') : null;
      await _dropTouch(dk, null);
    }
    if (_tEl) { _tEl.style.opacity = ''; _tEl = null; }
    _tOn = false; _dragTaskId = null; _tId = null; _tZone = null;
  });
  card.addEventListener('touchcancel',()=>{
    clearTimeout(_tTmr);
    if(_tRaf){cancelAnimationFrame(_tRaf);_tRaf=null;}
    if(_tc){_tc.remove();_tc=null;}
    if(_tEl){_tEl.style.opacity='';_tEl=null;}
    if(_tZone)_tZone.classList.remove('drag-over');
    _tOn=false;_dragTaskId=null;_tId=null;_tZone=null;
  });
}
function _beginDrag(card,touch) {
  const r=card.getBoundingClientRect();
  _tc=card.cloneNode(true);
  _tc._ox=touch.clientX-r.left;_tc._oy=touch.clientY-r.top;
  _tc.style.cssText=`position:fixed;width:${r.width}px;left:${r.left}px;top:${r.top}px;opacity:0.93;z-index:99999;pointer-events:none;transform:scale(1.04) rotate(0.5deg);box-shadow:0 12px 36px rgba(0,0,0,0.7);border:1px solid var(--accent)!important;border-radius:6px;transition:none;margin:0;background:var(--surface3);`;
  document.body.appendChild(_tc);card.style.opacity='0.15';_dragTaskId=_tId;
}
function _moveDrag() {
  _tRaf=null;if(!_tc)return;
  _tc.style.left=(_tX-_tc._ox)+'px';_tc.style.top=(_tY-_tc._oy)+'px';
  if(_tY<80)window.scrollBy(0,-10);else if(_tY>window.innerHeight-80)window.scrollBy(0,10);
}
async function _dropTouch(dayKey, targetCardId) {
  if(!_dragTaskId||_isGuest)return;
  if(targetCardId&&targetCardId!==_dragTaskId) {
    await handleReorder(_dragTaskId, targetCardId);
    return;
  }
  const dragged=_tasks.find(t=>t.id===_dragTaskId);
  if(!dragged)return;
  const zoneTasks=_tasks.filter(t=>t.dayKey===(dayKey||null)&&t.id!==_dragTaskId);
  const maxOrder=zoneTasks.length?Math.max(...zoneTasks.map(t=>t.order||t.createdAt||0)):0;
  try{const{doc,updateDoc}=_firestore;await updateDoc(doc(_db,`users/${_uid}/tasks`,_dragTaskId),{dayKey:dayKey||null,order:maxOrder+1});showToast(dayKey?'Görev güne atandı':'Görev havuza taşındı');}catch(e){showToast('Hata: '+e.message);}
}

// ══════════════════════════════════════════
// DRAG & DROP (desktop) + REORDER
// ══════════════════════════════════════════
async function handleDrop(e,dayKey) {
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  if(!_dragTaskId||_isGuest)return;
  // Sadece gün/havuz değişikliği — sıralama card drop ile yapılıyor
  const dragged=_tasks.find(t=>t.id===_dragTaskId);
  if(!dragged)return;
  // Hedef zone'daki görevlerin en sonuna ekle
  const zoneTasks=_tasks.filter(t=>t.dayKey===(dayKey||null)&&t.id!==_dragTaskId);
  const maxOrder=zoneTasks.length?Math.max(...zoneTasks.map(t=>t.order||t.createdAt||0)):0;
  try{
    const{doc,updateDoc}=_firestore;
    await updateDoc(doc(_db,`users/${_uid}/tasks`,_dragTaskId),{dayKey:dayKey||null,order:maxOrder+1});
    showToast(dayKey?'Görev güne atandı':'Görev havuza taşındı');
  }catch(err){showToast('Hata: '+err.message);}
  _dragTaskId=null;
}

async function handleReorder(draggedId, targetId) {
  if(!draggedId||!targetId||draggedId===targetId||_isGuest)return;
  const dragged=_tasks.find(t=>t.id===draggedId);
  const target=_tasks.find(t=>t.id===targetId);
  if(!dragged||!target)return;
  // Aynı container içinde mi?
  if(dragged.dayKey!==target.dayKey)return;
  // Target'ın order'ını al, dragged'a ver, aralarını kaydır
  const containerTasks=[..._tasks.filter(t=>t.dayKey===target.dayKey)].sort((a,b)=>(a.order||a.createdAt||0)-(b.order||b.createdAt||0));
  const newOrder=[];
  const withoutDragged=containerTasks.filter(t=>t.id!==draggedId);
  const targetIdx=withoutDragged.findIndex(t=>t.id===targetId);
  withoutDragged.splice(targetIdx,0,dragged);
  withoutDragged.forEach((t,i)=>newOrder.push({id:t.id,order:i*10}));
  try{
    const{doc,updateDoc}=_firestore;
    await Promise.all(newOrder.map(({id,order})=>updateDoc(doc(_db,`users/${_uid}/tasks`,id),{order})));
  }catch(e){showToast('Hata: '+e.message);}
}

// ══════════════════════════════════════════
// WEEK ARCHIVE CHECK — Pazar gece 00:00
// ══════════════════════════════════════════
async function checkWeekArchive() {
  if(_isGuest||!_uid)return;
  const now=new Date();
  // Bugün Pazartesi mi? (0=Paz, 1=Pzt)
  // Eğer bugün Pazartesi ise, geçen haftanın (offset=-1) verilerini arşivle
  if(now.getDay()!==1)return; // Sadece Pazartesi çalıştır

  const prevWeekStart=getWeekStart(-1); // Geçen Pazartesi
  const prevDays=getDaysOfWeek(prevWeekStart);
  const prevKeys=prevDays.map(dateKey);
  const archiveKey=dateKey(prevWeekStart);

  // Zaten arşivlenmiş mi?
  const exists=_archivedWeeks.find(w=>w.id===archiveKey);
  if(exists)return;

  // O haftaya ait görevler
  const weekTasks=_tasks.filter(t=>t.dayKey&&prevKeys.includes(t.dayKey));
  if(weekTasks.length===0)return;

  const {doc,setDoc,deleteDoc}=_firestore;

  // Arşive kaydet
  await setDoc(doc(_db,`users/${_uid}/archivedWeeks`,archiveKey),{
    weekStart:prevWeekStart.getTime(),
    label:`${formatWeekRange(prevDays)}`,
    tasks:weekTasks.map(t=>({...t})),
    archivedAt:Date.now()
  });

  // O haftanın görevlerini havuza taşı (dayKey null) veya sil — tekrarlayan olmayanları temizle
  for(const t of weekTasks) {
    if(t.recurring==='true') {
      await _firestore.updateDoc(doc(_db,`users/${_uid}/tasks`,t.id),{dayKey:null,completed:false});
    } else {
      await deleteDoc(doc(_db,`users/${_uid}/tasks`,t.id));
    }
  }
  showToast('Geçen hafta arşivlendi');
}

// EXAM — NET HESAPLAMA
// ══════════════════════════════════════════
function calcNet(d,w,max) {
  const net=d-(w*0.25);
  return Math.max(0,Math.round(net*100)/100);
}

function buildNetsUI(type) {
  const subjects=type==='TYT'?TYT_SUBJECTS:AYT_SUBJECTS;
  const counts=type==='TYT'?TYT_COUNTS:AYT_COUNTS;
  let html='<div class="net-input-grid">';
  for(const subj of Object.keys(subjects)) {
    const max=counts[subj]||0;
    if(subj==='Geometri (TYT)'||subj==='Geometri (AYT)')continue; // Geometri matematiğe dahil
    const dispName=subj==='Matematik'?(type==='TYT'?'Mat+Geo (40)':'Mat+Geo (40)'):subj;
    const realMax=subj==='Matematik'?(type==='TYT'?40:40):max;
    html+=`<div class="net-input-group">
      <div class="net-input-label">${dispName} (max ${realMax})</div>
      <div class="net-input-row">
        <input class="net-mini-input" id="nd-${subj}" type="number" min="0" max="${realMax}" placeholder="D" oninput="updateNet('${subj}','${realMax}')">
        <span class="net-mini-sep">/</span>
        <input class="net-mini-input" id="nw-${subj}" type="number" min="0" max="${realMax}" placeholder="Y" oninput="updateNet('${subj}','${realMax}')">
      </div>
      <div class="net-result" id="nr-${subj}">— net</div>
    </div>`;
  }
  html+='</div>';
  document.getElementById('tab-nets').innerHTML=html;
}

function updateNet(subj,max) {
  const d=parseFloat(document.getElementById('nd-'+subj)?.value)||0;
  const w=parseFloat(document.getElementById('nw-'+subj)?.value)||0;
  const net=calcNet(d,w,max);
  const el=document.getElementById('nr-'+subj);
  if(el) el.textContent=net+' net';
}

function buildWrongsUI(type) {
  const subjects=type==='TYT'?TYT_SUBJECTS:AYT_SUBJECTS;
  let html='<div class="topic-counter-grid">';
  for(const [subj,topics] of Object.entries(subjects)) {
    html+=`<div class="topic-subject-section"><div class="topic-subject-label">${subj}</div>`;
    topics.forEach((topic,i)=>{
      const key=`${subj}__${i}`;
      html+=`<div class="topic-counter-row">
        <div class="topic-counter-name">${topic}</div>
        <button class="counter-btn" onclick="adjWrong('${key}',-1)">−</button>
        <div class="counter-val" id="cv-${key}">0</div>
        <button class="counter-btn" onclick="adjWrong('${key}',1)">+</button>
      </div>`;
    });
    html+='</div>';
  }
  html+='</div>';
  document.getElementById('tab-wrongs').innerHTML=html;
}

function adjWrong(key,delta) {
  _wrongCounts[key]=Math.max(0,((_wrongCounts[key]||0)+delta));
  const el=document.getElementById('cv-'+key);
  if(el){el.textContent=_wrongCounts[key];el.className='counter-val'+((_wrongCounts[key]>0)?' nonzero':'');}
}

        <table class="net-table">
          <tr><th>Ders</th><th>Doğru</th><th>Yanlış</th><th>Net</th></tr>
          ${Object.entries(exam.nets||{}).map(([s,v])=>`<tr><td>${s.replace(' (TYT)','').replace(' (AYT)','')}</td><td>${v.d}</td><td>${v.w}</td><td class="net-val">${v.net}</td></tr>`).join('')}
          <tr class="total-row"><td colspan="3">Toplam</td><td>${exam.totalNet||0}</td></tr>
        </table>
        ${Object.keys(exam.wrongs||{}).length?`
        <div class="wrong-topics-section">
          <div class="wrong-topics-title">Yanlış Yapılan Konular</div>
          ${renderWrongTopics(exam)}
        </div>`:''}
      </div>`;
    c.appendChild(el);
  });
}

function renderWrongTopics(exam) {
  const subjects=exam.type==='TYT'?TYT_SUBJECTS:AYT_SUBJECTS;
  let html='';
  for(const [subj,topics] of Object.entries(subjects)) {
    const subjWrongs=topics.map((t,i)=>({t,count:exam.wrongs[`${subj}__${i}`]||0})).filter(x=>x.count>0);
    if(!subjWrongs.length)continue;
    html+=`<div class="wrong-subject"><div class="wrong-subject-name">${subj}</div><div class="wrong-topics-grid">`;
    subjWrongs.forEach(({t,count})=>{html+=`<div class="wrong-topic-row"><div class="wrong-topic-name">${t}</div><div class="wrong-topic-count">${count}</div></div>`;});
    html+='</div></div>';
  }
  return html||'<div style="color:var(--text-dim);font-size:0.72rem">Hata girilmemiş</div>';
}

async function editExam(id) {
  const exam=_exams.find(e=>e.id===id);if(!exam)return;
  _editingExamId=id;_examSineType=exam.type||'TYT';_wrongCounts={...exam.wrongs||{}};
  document.getElementById('exam-modal-title').textContent='Denemeyi Düzenle';
  document.getElementById('ef-name').value=exam.name||'';
  // type toggle
  document.querySelectorAll('#exam-modal .toggle-group .toggle-btn').forEach(b=>b.classList.toggle('active',b.dataset.val===_examSineType));
  buildNetsUI(_examSineType);buildWrongsUI(_examSineType);
  // Restore nets
  for(const [subj,v] of Object.entries(exam.nets||{})) {
    const dEl=document.getElementById('nd-'+subj);const wEl=document.getElementById('nw-'+subj);
    if(dEl)dEl.value=v.d;if(wEl)wEl.value=v.w;
    updateNet(subj,v.max||40);
  }
  // Restore wrongs
  for(const [key,count] of Object.entries(_wrongCounts)) {
    const el=document.getElementById('cv-'+key);
    if(el){el.textContent=count;el.className='counter-val'+(count>0?' nonzero':'');}
  }
  document.querySelectorAll('.exam-tab').forEach((b,i)=>b.classList.toggle('active',i===0));
  document.getElementById('tab-nets').style.display='block';
  document.getElementById('tab-wrongs').style.display='none';
  document.getElementById('exam-modal').classList.add('open');
}

async function deleteExam(id) {
  if(!confirm('Bu denemeyi silmek istediğinden emin misin?'))return;
  const{doc,deleteDoc}=_firestore;
  await deleteDoc(doc(_db,`users/${_uid}/exams`,id));showToast('Deneme silindi');
}

// ══════════════════════════════════════════
// ANALYSIS
// ══════════════════════════════════════════
document.getElementById('open-analysis-btn').onclick=()=>{
  _snd('click');_analysisN=0;
  document.querySelectorAll('#analysis-filter .filter-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  renderAnalysis();
  document.getElementById('analysis-modal').classList.add('open');
};

function selectAnalysisFilter(btn) {
  document.querySelectorAll('#analysis-filter .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  _analysisN=parseInt(btn.dataset.n)||0;
  renderAnalysis();
}

function renderAnalysis() {
  const body=document.getElementById('analysis-body');
  let exams=[..._exams].sort((a,b)=>b.createdAt-a.createdAt);
  if(_analysisN>0)exams=exams.slice(0,_analysisN);
  if(!exams.length){body.innerHTML='<div style="color:var(--text-dim);font-size:0.8rem;padding:2rem;text-align:center">Yeterli deneme yok</div>';return;}

  // Tüm konu yanlışlarını topla
  const totals={};
  exams.forEach(exam=>{
    const subjects=exam.type==='TYT'?TYT_SUBJECTS:AYT_SUBJECTS;
    for(const [subj,topics] of Object.entries(subjects)) {
      topics.forEach((t,i)=>{
        const key=`${subj}__${i}`;
        const count=exam.wrongs?.[key]||0;
        if(!totals[subj])totals[subj]={};
        totals[subj][t]=(totals[subj][t]||0)+count;
      });
    }
  });

  let html='';
  const subjColors=['#e05c7a','#5c9ee0','#5ce0a8','#a05ce0','#e08c5c','#e0c55c','#7ae05c','#5ce0d4','#e05ce0'];
  let ci=0;
  for(const [subj,topics] of Object.entries(totals)) {
    const topicArr=Object.entries(topics).filter(([,c])=>c>0).sort((a,b)=>b[1]-a[1]);
    if(!topicArr.length)continue;
    const maxCount=topicArr[0][1];
    const color=subjColors[ci++%subjColors.length];
    html+=`<div class="analysis-subject"><div class="analysis-subject-name">${subj}</div>`;
    topicArr.forEach(([topic,count])=>{
      const pct=Math.round(count/maxCount*100);
      html+=`<div class="analysis-topic-row">
        <div class="analysis-topic-name">${topic}</div>
        <div class="analysis-bar-wrap"><div class="analysis-bar-fill" style="width:${pct}%;background:${color}"></div></div>
        <div class="analysis-topic-count">${count}</div>
      </div>`;
    });
    html+='</div>';
  }
  body.innerHTML=html||'<div style="color:var(--text-dim);font-size:0.8rem;padding:2rem;text-align:center">Hiç yanlış konu girilmemiş</div>';
}

function buildNoteCategorySelect() {
  const sel=document.getElementById('note-category');
  sel.innerHTML=NOTE_CATS.map(c=>`<option value="${c}">${c}</option>`).join('');
}

function renderNotes() {
  // Tabs
  const tabsEl=document.getElementById('notes-tabs');
  tabsEl.innerHTML=NOTE_CATS.map(c=>`<button class="note-tab-btn ${c===_activeNoteTab?'active':''}" onclick="switchNoteTab('${c}')">${c}</button>`).join('');

  // Grid
  const grid=document.getElementById('notes-grid');
  const filtered=_notes.filter(n=>n.category===_activeNoteTab);
  if(!filtered.length){grid.innerHTML='<div style="color:var(--text-dim);font-size:0.8rem;padding:2rem;grid-column:1/-1">bu kategoride henüz not yok</div>';return;}
  grid.innerHTML='';
  [...filtered].sort((a,b)=>b.createdAt-a.createdAt).forEach(note=>{
    const el=document.createElement('div');el.className='note-card';
    el.innerHTML=`
      <div class="note-card-header">
        <div class="note-card-date">${new Date(note.createdAt).toLocaleDateString('tr-TR')}</div>
        <div class="note-card-actions">
          <button class="view-btn" onclick="_snd('click');editNote('${note.id}')">düzenle</button>
          <button class="delete-btn" style="border:1px solid var(--border)" onclick="_snd('delete');deleteNote('${note.id}')">sil</button>
        </div>
      </div>
      <div class="note-card-body">${note.html||''}</div>`;
    grid.appendChild(el);
  });
}

function switchNoteTab(cat) {
  _activeNoteTab=cat;
  document.querySelectorAll('.note-tab-btn').forEach(b=>b.classList.toggle('active',b.textContent===cat));
  renderNotes();
}

document.getElementById('new-note-btn').onclick=()=>{
  _snd('click');
  _editingNoteId=null;
  document.getElementById('note-modal-title').textContent='Yeni Not';
  document.getElementById('note-editor').innerHTML='';
  document.getElementById('note-category').value=_activeNoteTab;
  document.getElementById('note-modal').classList.add('open');
  setTimeout(()=>document.getElementById('note-editor').focus(),100);
};

document.getElementById('save-note-btn').onclick=async()=>{
  _snd('save');
  const html=document.getElementById('note-editor').innerHTML.trim();
  if(!html||html==='<br>'){showToast('Not boş olamaz');return;}
  const cat=document.getElementById('note-category').value;
  const data={html,category:cat,createdAt:_editingNoteId?(_notes.find(n=>n.id===_editingNoteId)?.createdAt||Date.now()):Date.now(),updatedAt:Date.now()};
  try{
    const{collection,doc,addDoc,updateDoc}=_firestore;
    if(_editingNoteId){await updateDoc(doc(_db,`users/${_uid}/notes`,_editingNoteId),data);showToast('Not güncellendi');}
    else{await addDoc(collection(_db,`users/${_uid}/notes`),data);showToast('Not kaydedildi');}
    closeModal('note-modal');
  }catch(e){showToast('Hata: '+e.message);}
};

function editNote(id) {
  const note=_notes.find(n=>n.id===id);if(!note)return;
  _editingNoteId=id;
  document.getElementById('note-modal-title').textContent='Notu Düzenle';
  document.getElementById('note-editor').innerHTML=note.html||'';
  document.getElementById('note-category').value=note.category||'Genel';
  document.getElementById('note-modal').classList.add('open');
}

async function deleteNote(id) {
  if(!confirm('Notu silmek istediğinden emin misin?'))return;
  const{doc,deleteDoc}=_firestore;
  await deleteDoc(doc(_db,`users/${_uid}/notes`,id));showToast('Not silindi');
}

// ══════════════════════════════════════════
// RICH TEXT EDITOR — custom, execCommand yok
// ══════════════════════════════════════════
function _ed() { return document.getElementById('note-editor'); }

function _applySpan(styles) {
  const editor = _ed(); editor.focus();
  const sel = window.getSelection();
  if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return;
  const range = sel.getRangeAt(0);
  try {
    const frag = range.extractContents();
    const span = document.createElement('span');
    Object.assign(span.style, styles);
    span.appendChild(frag);
    range.insertNode(span);
    const nr = document.createRange();
    nr.selectNodeContents(span);
    sel.removeAllRanges(); sel.addRange(nr);
  } catch(e) {}
}

function _toggleSpan(prop, onVal, offVal) {
  const editor = _ed(); editor.focus();
  const sel = window.getSelection();
  if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return;
  const range = sel.getRangeAt(0);
  const container = range.commonAncestorContainer;
  const el = container.nodeType === 3 ? container.parentElement : container;
  const cur = window.getComputedStyle(el)[prop];
  _applySpan({ [prop]: (cur === onVal) ? offVal : onVal });
}

function execRich(cmd) {
  if (cmd === 'bold') _toggleSpan('fontWeight', 'bold', 'normal');
  else if (cmd === 'italic') _toggleSpan('fontStyle', 'italic', 'normal');
  else if (cmd === 'underline') _toggleSpan('textDecoration', 'underline', 'none');
  else if (cmd === 'clear') {
    const editor = _ed(); editor.focus();
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return;
    const range = sel.getRangeAt(0);
    try {
      const text = document.createTextNode(range.toString());
      range.deleteContents(); range.insertNode(text);
    } catch(e) {}
  }
}

function execColor(color) { _applySpan({ color }); }

function execFontSize(size) {
  const map = { sm: '0.68rem', md: '0.85rem', lg: '1.05rem', xl: '1.3rem' };
  _applySpan({ fontSize: map[size] || size });
}
